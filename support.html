    <h2>常見問題</h2>
    <p><strong>Q：無法掃描條碼？</strong><br>請確保相機權限已開啟（設定 → 隱私權 → 相機 → CrossScan），並確保光線充足。</p>
    <p><strong>Q：掃描記錄在哪裡？</strong><br>所有掃描記錄會自動儲存在「歷史記錄」分頁中，僅儲存於您的裝置上。</p>
    <p><strong>Q：如何刪除記錄？</strong><br>在歷史記錄頁面左滑即可刪除單筆記錄，或點擊右上角「清除全部」。</p>
